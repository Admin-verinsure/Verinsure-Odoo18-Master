name: Odoo18 Deploy (staging + second server + verinsure)

on:
  push:
    branches: ["master"]
    paths:
      - "addons/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:
    inputs:
      server:
        description: "Select which server to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - secondary
          - verinsure

env:
  STG_CUSTOM: /opt/odoo18/custom-addons
  SEC_CUSTOM: /opt/odoo/current/addons
  VER_CUSTOM: /opt/odoo18/odoo18-addons
  SERVICE_NAME: odoo18
  ODOO_DB: staging_not4profit

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Deployment Target
        id: select
        shell: bash
        run: |
          set -euo pipefail
          SERVER="${{ github.event.inputs.server || 'staging' }}"
          echo "Server target: $SERVER"

          case "$SERVER" in
            staging)
              echo "SSH_HOST=${{ secrets.STAGING_SSH_HOST }}" >> $GITHUB_ENV
              echo "SSH_PORT=${{ secrets.STAGING_SSH_PORT }}" >> $GITHUB_ENV
              echo "SSH_USER=${{ secrets.STAGING_SSH_USER }}" >> $GITHUB_ENV
              echo "DEPLOY_PATH=${{ env.STG_CUSTOM }}" >> $GITHUB_ENV
              {
                echo "SSH_KEY<<EOF"
                echo "${{ secrets.STAGING_SSH_KEY }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            secondary)
              echo "SSH_HOST=${{ secrets.SSH_HOST }}" >> $GITHUB_ENV
              echo "SSH_PORT=${{ secrets.SSH_PORT }}" >> $GITHUB_ENV
              echo "SSH_USER=${{ secrets.SSH_USER }}" >> $GITHUB_ENV
              echo "DEPLOY_PATH=${{ env.SEC_CUSTOM }}" >> $GITHUB_ENV
              {
                echo "SSH_KEY<<EOF"
                echo "${{ secrets.SSH_KEY }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            verinsure)
              echo "SSH_HOST=${{ secrets.VERINSURE_SSH_HOST }}" >> $GITHUB_ENV
              echo "SSH_PORT=${{ secrets.VERINSURE_SSH_PORT }}" >> $GITHUB_ENV
              echo "SSH_USER=${{ secrets.VERINSURE_SSH_USER || 'ubuntu' }}" >> $GITHUB_ENV
              echo "DEPLOY_PATH=${{ env.VER_CUSTOM }}" >> $GITHUB_ENV
              {
                echo "SSH_KEY<<EOF"
                echo "${{ secrets.VERINSURE_SSH_KEY }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown server: $SERVER"; exit 1;;
          esac

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ env.SSH_PORT }}" "${{ env.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target folder (owned by odoo18)
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "sudo install -d -o odoo18 -g odoo18 -m 0755 '${{ env.DEPLOY_PATH }}'"

      - name: Ensure addons_path contains deployment folder (idempotent)
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" '
            set -euo pipefail
            CONF=/etc/odoo18.conf
            ADDP="${{ env.DEPLOY_PATH }}"
            if ! grep -qE "^[[:space:]]*addons_path[[:space:]]*=" "$CONF"; then
              echo "addons_path = /opt/odoo18/addons,/opt/odoo18/odoo/addons,$ADDP" | sudo tee -a "$CONF" >/dev/null
            fi
            if ! grep -E "^[[:space:]]*addons_path[[:space:]]*=" "$CONF" | grep -q "$ADDP"; then
              sudo sed -i -E "s|^(addons_path[[:space:]]*=[[:space:]]*)(.*)|\1\2,$ADDP|" "$CONF"
            fi
          '

      - name: Sync ./addons -> target folder
        if: ${{ hashFiles('addons/**') != '' }}
        run: |
          rsync -az --delete \
            --rsync-path="sudo rsync" \
            --chown=odoo18:odoo18 \
            -e "ssh -p ${{ env.SSH_PORT }}" \
            ./addons/ "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: List deployed addons (sanity)
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "sudo bash -lc 'set -euxo pipefail; ls -la ${DEPLOY_PATH} | head -n 200'"

      - name: Restart Odoo
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "sudo systemctl restart '${{ env.SERVICE_NAME }}' && sleep 3 && sudo systemctl --no-pager -l status '${{ env.SERVICE_NAME }}' || true"

      - name: Compute changed modules
        id: mods
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ github.event.before || 'HEAD~1' }}"
          CHANGED=$(git diff --name-only "$base_ref" HEAD -- addons/ | awk -F/ 'NF>1{print $2}' | sort -u | tr '\n' ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Upgrade changed modules
        if: steps.mods.outputs.changed != ''
        run: |
          MODS="${{ steps.mods.outputs.changed }}"
          echo "Upgrading: $MODS"
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "sudo -u odoo18 /opt/odoo18/venv/bin/python3 /opt/odoo18/odoo-bin \
               -c /etc/odoo18.conf -d '${{ env.ODOO_DB }}' -u $(echo $MODS | tr ' ' ',') --stop-after-init || true"

      - name: Health check
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "curl -sS -I http://127.0.0.1:8069/web?db=${{ env.ODOO_DB }} | head -n1 || true"
