         # mkdir -p ~/.ssh
         # echo "$SSH_PRIVATE_KEY" > ~/.ssh/not4profit
        #  chmod 600 ~/.ssh/not4profit
          #ssh-keyscan -H 120.138.30.170 >> ~/.ssh/known_hosts

      #- name: Deploy to Odoo Server
       # run: |
        # scp -r ./addons/account_move_multi_cancel root@103.19.4.104:/opt/odoo/addons/Not4Profit.online/addons/
       
          
      #- name: Update Odoo Database
      #  run: |
       #   ssh root@103.19.4.104 "sudo -u odoo /odoo-venv/bin/python /opt/odoo/odoo-bin -c /opt/odoo/debian/odoo.conf -d Not4ProfitOrganisation -u all
        #  "


      - name: 📂 Deploy Module to Odoo Server
        run: |
              scp -i private_key -o StrictHostKeyChecking=no -r ./addons/base_account_budget ubuntu@120.138.30.170:/opt/odoo18/odoo18-addons/
              scp -i private_key -o StrictHostKeyChecking=no -r ./addons/base_accounting_kit ubuntu@120.138.30.170:/opt/odoo18/odoo18-addons/
              scp -i private_key -o StrictHostKeyChecking=no -r ./addons/app_menu_alphabetical_order ubuntu@120.138.30.170:/opt/odoo18/odoo17-addons/
              scp -i private_key -o StrictHostKeyChecking=no -r ./addons/account_move_multi_cancel ubuntu@120.138.30.170:/opt/odoo18/odoo18-addons/
              scp -i private_key -o StrictHostKeyChecking=no -r ./addons/bi_sms_client_generic ubuntu@120.138.30.170:/opt/odoo18/odoo18-addons/



      - name: Start Odoo Server
        run: |
              ssh -i private_key -o StrictHostKeyChecking=no ubuntu@120.138.30.170 "echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S systemctl start odoo18"
