name: Odoo18 Deploy (staging + second server + verinsure)

on:
  push:
    branches: ["master"]
    paths:
      - "addons/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:
    inputs:
      server:
        description: "Select which server to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - secondary
          - verinsure

env:
  STG_CUSTOM: /opt/odoo18/custom-addons
  SEC_ADDONS: /opt/odoo/current/addons
  VER_CUSTOM: /opt/odoo18/odoo18-addons
  SERVICE_NAME: odoo18
  ODOO_DB: staging_not4profit

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Deployment Target
        id: select
        shell: bash
        run: |
          set -euo pipefail
          SERVER="${{ github.event.inputs.server || 'staging' }}"
          echo "Server target: $SERVER"

          # Define src|dest pairs (newline-separated) and DEPLOY_PATHS (space-separated)
          case "$SERVER" in
            staging)
              echo "SSH_HOST=${{ secrets.STAGING_SSH_HOST }}" >> $GITHUB_ENV
              echo "SSH_PORT=${{ secrets.STAGING_SSH_PORT }}" >> $GITHUB_ENV
              echo "SSH_USER=${{ secrets.STAGING_SSH_USER }}" >> $GITHUB_ENV
              {
                echo "SYNC_PAIRS<<EOF"
                echo "addons|${{ env.STG_CUSTOM }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              echo "DEPLOY_PATHS=${{ env.STG_CUSTOM }}" >> $GITHUB_ENV
              {
                echo "SSH_KEY<<EOF"
                echo "${{ secrets.STAGING_SSH_KEY }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            secondary)
              echo "SSH_HOST=${{ secrets.SSH_HOST }}" >> $GITHUB_ENV
              echo "SSH_PORT=${{ secrets.SSH_PORT }}" >> $GITHUB_ENV
              echo "SSH_USER=${{ secrets.SSH_USER }}" >> $GITHUB_ENV
              {
                echo "SYNC_PAIRS<<EOF"
                echo "addons|${{ env.SEC_ADDONS }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              echo "DEPLOY_PATHS=${{ env.SEC_ADDONS }}" >> $GITHUB_ENV
              {
                echo "SSH_KEY<<EOF"
                echo "${{ secrets.SSH_KEY }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            verinsure)
              echo "SSH_HOST=${{ secrets.VERINSURE_SSH_HOST }}" >> $GITHUB_ENV
              echo "SSH_PORT=${{ secrets.VERINSURE_SSH_PORT }}" >> $GITHUB_ENV
              echo "SSH_USER=${{ secrets.VERINSURE_SSH_USER || 'ubuntu' }}" >> $GITHUB_ENV
              {
                echo "SYNC_PAIRS<<EOF"
                echo "addons|${{ env.VER_CUSTOM }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              echo "DEPLOY_PATHS=${{ env.VER_CUSTOM }}" >> $GITHUB_ENV
              {
                echo "SSH_KEY<<EOF"
                echo "${{ secrets.VERINSURE_SSH_KEY }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown server: $SERVER"; exit 1;;
          esac

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ env.SSH_PORT }}" "${{ env.SSH_HOST }}" >> ~/.ssh/known_hosts

      # Detect unix user/group for correct ownership
      - name: Detect Odoo unix user/group
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" 'bash -lc "
            set -euo pipefail
            SVC=${{ env.SERVICE_NAME }}
            U=\$(systemctl show -p User \"\$SVC\" 2>/dev/null | sed -n \"s/^User=//p\")
            G=\$(getent group \"\$U\" >/dev/null 2>&1 && id -gn \"\$U\" || echo \"\")
            if [ -z \"\$U\" ] || [ -z \"\$G\" ]; then
              if [ -e /opt/odoo18/odoo-bin ]; then
                U=\$(stat -c %U /opt/odoo18/odoo-bin)
                G=\$(stat -c %G /opt/odoo18/odoo-bin)
              fi
            fi
            if [ -z \"\$U\" ] || [ \"\$U\" = \"root\" ]; then U=${{ env.SSH_USER }}; fi
            if [ -z \"\$G\" ] || [ \"\$G\" = \"root\" ]; then G=\$(id -gn \"\$U\"); fi
            echo ODOO_UNIX_USER=\$U
            echo ODOO_UNIX_GROUP=\$G
          "' | tee -a "$GITHUB_ENV"

      - name: Ensure target folders (owned by detected user)
        run: |
          set -euo pipefail
          # Read newline-separated src|dest pairs and create each dest
          while IFS='|' read -r SRC DEST; do
            [ -z "$SRC" ] && continue
            ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
              "sudo install -d -o '${{ env.ODOO_UNIX_USER }}' -g '${{ env.ODOO_UNIX_GROUP }}' -m 0755 '$DEST'"
          done <<< "${{ env.SYNC_PAIRS }}"

      - name: Ensure addons_path contains all deployment folders (idempotent)
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" '
            set -euo pipefail
            CONF=/etc/odoo18.conf
            # Ensure addons_path exists; if missing, initialize with core defaults
            if ! grep -qE "^[[:space:]]*addons_path[[:space:]]*=" "$CONF"; then
              echo "addons_path = /opt/odoo18/addons,/opt/odoo18/odoo/addons" | sudo tee -a "$CONF" >/dev/null
            fi
            # Append any missing paths from $DEPLOY_PATHS
            for p in '"${{ env.DEPLOY_PATHS }}"'; do
              grep -E "^[[:space:]]*addons_path[[:space:]]*=" "$CONF" | grep -q "$p" || \
                sudo sed -i -E "s|^(addons_path[[:space:]]*=[[:space:]]*)(.*)|\1\2,$p|" "$CONF"
            done
          '

      - name: Sync sources -> targets
        run: |
          set -euo pipefail
          while IFS='|' read -r SRC DEST; do
            [ -z "$SRC" ] && continue
            if [ -d "./$SRC" ]; then
              echo "Syncing ./$SRC -> $DEST"
              rsync -az --delete \
                --rsync-path="sudo rsync" \
                --chown=${{ env.ODOO_UNIX_USER }}:${{ env.ODOO_UNIX_GROUP }} \
                -e "ssh -p ${{ env.SSH_PORT }}" \
                "./$SRC/" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}:$DEST/"
            else
              echo "Skipping ./$SRC (not found)"
            fi
          done <<< "${{ env.SYNC_PAIRS }}"

      - name: List deployed addons (sanity)
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "sudo bash -lc 'set -euxo pipefail; for d in ${DEPLOY_PATHS}; do echo \"--- \$d\"; ls -la \"\$d\" | head -n 200; done'"

      - name: Restart Odoo
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "sudo systemctl restart '${{ env.SERVICE_NAME }}' && sleep 3 && sudo systemctl --no-pager -l status '${{ env.SERVICE_NAME }}' || true"

      - name: Compute changed modules
        id: mods
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ github.event.before || 'HEAD~1' }}"
          CHANGED=""
          while IFS='|' read -r SRC DEST; do
            [ -z "$SRC" ] && continue
            if [ -d "./$SRC" ]; then
              MODS=$(git diff --name-only "$base_ref" HEAD -- "./$SRC"/ | \
                awk -F/ 'NF>1{print $2}' | sort -u)
              CHANGED="$CHANGED $MODS"
            fi
          done <<< "${{ env.SYNC_PAIRS }}"
          CHANGED=$(echo $CHANGED | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed modules: $CHANGED"

      - name: Upgrade changed modules
        if: steps.mods.outputs.changed != ''
        run: |
          MODS="${{ steps.mods.outputs.changed }}"
          echo "Upgrading: $MODS"
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            "sudo -u '${{ env.ODOO_UNIX_USER }}' /opt/odoo18/venv/bin/python3 /opt/odoo18/odoo-bin \
               -c /etc/odoo18.conf -d '${{ env.ODOO_DB }}' -u $(echo $MODS | tr ' ' ',') --stop-after-init || true"

      - name: Health check
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ env.SSH_USER }}@${{ env.SSH_HOST }}" \
            'curl -sS -I "http://127.0.0.1:8069/web?db=${{ env.ODOO_DB }}" | head -n1 || true'
