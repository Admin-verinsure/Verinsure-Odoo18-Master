name: Odoo18 Deploy (staging)

on:
  push:
    branches: ["master"]
    paths:
      - "addons/**"
      - "odoo18-addons/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch: {}

env:
  STG_ADDONS: /opt/odoo/current/addons
  STG_O18_ADDONS: /opt/odoo18/odoo18-addons
  SERVICE_NAME: odoo18

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.STAGING_SSH_PORT }}" "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target folders
        run: |
          ssh -p "${{ secrets.STAGING_SSH_PORT }}" "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "sudo install -d -o odoo18 -g odoo18 -m 0755 '${{ env.STG_ADDONS }}' '${{ env.STG_O18_ADDONS }}'"

      - name: Sync ./addons -> /opt/odoo/current/addons
        if: ${{ hashFiles('addons/**') != '' }}
        run: |
          rsync -az --delete \
            --rsync-path="sudo rsync" \
            --chown=odoo18:odoo18 \
            -e "ssh -p ${{ secrets.STAGING_SSH_PORT }}" \
            ./addons/ "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:${{ env.STG_ADDONS }}/"

      - name: Sync ./odoo18-addons -> /opt/odoo18/odoo18-addons
        if: ${{ hashFiles('odoo18-addons/**') != '' }}
        run: |
          rsync -az --delete \
            --rsync-path="sudo rsync" \
            --chown=odoo18:odoo18 \
            -e "ssh -p ${{ secrets.STAGING_SSH_PORT }}" \
            ./odoo18-addons/ "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:${{ env.STG_O18_ADDONS }}/"

      - name: Restart Odoo
        run: |
          ssh -p "${{ secrets.STAGING_SSH_PORT }}" "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "sudo systemctl restart '${{ env.SERVICE_NAME }}' && sleep 3 && sudo systemctl --no-pager -l status '${{ env.SERVICE_NAME }}' || true"

      - name: Health check
        run: |
          ssh -p "${{ secrets.STAGING_SSH_PORT }}" "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "curl -sS -I http://127.0.0.1:8069/odoo | head -n1 || true"
