name: Odoo18 CI/CD

on:
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Choose server to deploy to'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - not4profit
          - rawcs
  #push:
  #  branches:
  #    - main
  #    - dms-odoo18

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        server: [not4profit, rawcs]

    steps:
    - name: ⏩ Skip if not selected server
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to != 'all' && github.event.inputs.deploy_to != matrix.server }}
      run: echo "Skipping server ${{ matrix.server }}"

    - name: 📥 Checkout repository
      uses: actions/checkout@v3

    - name: 🗝️ Set environment variables
      run: |
        if [ "${{ matrix.server }}" = "not4profit" ]; then
          echo "SSH_USER=${{ secrets.NFP_SSH_USER }}" >> $GITHUB_ENV
          echo "SERVER_IP=${{ secrets.NFP_SERVER_IP }}" >> $GITHUB_ENV
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key
        else
          echo "SSH_USER=${{ secrets.RAWCS_SSH_USER }}" >> $GITHUB_ENV
          echo "SERVER_IP=${{ secrets.RAWCS_SERVER_IP }}" >> $GITHUB_ENV
          echo "${{ secrets.SSH_PRIVATE_KEY_RAWCS }}" > private_key
        fi
        chmod 600 private_key

    - name: 🔐 Setup SSH Agent
      run: |
        eval "$(ssh-agent -s)"
        ssh-add private_key
        mkdir -p ~/.ssh
        ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts

    - name: 📦 Install Python packages on remote
      run: |
        ssh -i private_key -o StrictHostKeyChecking=no $SSH_USER@$SERVER_IP << 'EOF'
          python3 -m venv /home/$USER/venv
          source /home/$USER/venv/bin/activate
          pip install --upgrade pip
          pip install openpyxl qifparse pyfcm httpagentparser dropbox pyncclient nextcloud-api-wrapper boto3 paramiko
        EOF

    - name: 🚚 Deploy modules to ${{ matrix.server }}
      run: |
        MODULE_PATH="/opt/odoo18/odoo18-addons/"
        scp -i private_key -o StrictHostKeyChecking=no -r ./addons/* $SSH_USER@$SERVER_IP:$MODULE_PATH

    - name: 🔁 Restart Odoo
      run: |
        ssh -i private_key -o StrictHostKeyChecking=no $SSH_USER@$SERVER_IP "echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S systemctl restart odoo18"
